name: Deploy Worker (Astro + Cloudflare)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 🟢 Extract version from git tag
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # 🟡 Build (before deploy engine runs wrangler)
      - name: Build Astro Worker
        run: npm run build

      # 🟣 Run unified deploy engine (ledger + deploy + snapshot)
      - name: Deploy system
        run: node scripts/deploy.mjs "${{ steps.version.outputs.version }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}