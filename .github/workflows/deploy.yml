name: Deploy Worker (Astro + Cloudflare)

on:
  workflow_run:
    workflows: ["Create Release"]
    types:
      - completed

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Deploy system
        run: node scripts/deploy.mjs "${{ steps.version.outputs.version }}"
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}