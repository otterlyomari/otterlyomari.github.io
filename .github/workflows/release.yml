name: Create Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Configure git
      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # Generate CHANGELOG only (no version bump, no tag)
      - name: Update CHANGELOG
        run: npx standard-version --first-release --skip.bump=true --skip.tag=true

      # Push CHANGELOG changes back to repo
      - name: Push changes
        run: git push origin main